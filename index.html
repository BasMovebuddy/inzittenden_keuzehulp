<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inzittenden — Keuzehulp</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Ubuntu:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #6BBAB9;
      --teal-dark: #284A43;
      --teal-light: #e8f6f6;
      --text: #636466;
      --white: #ffffff;
      --shadow-card: 0 2px 12px rgba(40,74,67,0.10);
    }

    body {
      font-family: 'Ubuntu', sans-serif;
      background: linear-gradient(135deg, #e8f6f6 0%, #f0eefa 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 12px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 90px;
    }

    .header {
      text-align: center;
      padding: 16px 0 14px;
    }

    .header-badge {
      display: inline-block;
      background: var(--teal);
      color: white;
      font-family: 'Baloo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: var(--teal-dark);
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.7;
    }

    .card {
      background: var(--white);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
    }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-info { flex: 1; }

    .card-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--teal-dark);
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: var(--text);
      opacity: 0.6;
      margin-top: 1px;
    }

    .counter {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .counter-btn {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      color: var(--teal-dark);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .counter-btn:hover { background: var(--teal-light); }
    .counter-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .counter-value {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--teal-dark);
      min-width: 38px;
      text-align: center;
    }

    .leeftijden-wrap {
      margin-top: 12px;
      border-top: 1px solid #f0f0f0;
      padding-top: 12px;
    }

    .leeftijden-label {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--teal-dark);
      opacity: 0.6;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .kinderen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
    }

    .kind-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kind-label {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--teal-dark);
      opacity: 0.6;
    }

    .kind-input {
      font-family: 'Ubuntu', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--teal-dark);
      background: #f5f5f5;
      border: 1.5px solid transparent;
      border-radius: 8px;
      padding: 7px 6px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }

    .kind-input:focus {
      border-color: var(--teal);
      background: var(--teal-light);
    }

    .kind-input::placeholder { color: #ccc; }

    .summary-bar {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      max-width: 480px;
      z-index: 10;
    }

    .summary-inner {
      background: var(--teal-dark);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 6px 24px rgba(40,74,67,0.3);
    }

    .summary-label {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.78rem;
      color: var(--teal);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .summary-count {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1rem;
      color: white;
      font-weight: 700;
    }

    .send-btn {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .send-btn:hover { background: #5aa9a8; transform: translateY(-1px); }

    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--teal-dark);
      color: white;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.88rem;
      padding: 8px 18px;
      border-radius: 30px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 100;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-badge">Auto Keuzehulp</div>
    <h1>Wie rijden er mee?</h1>
    <p>Geef aan hoeveel mensen meereizen.</p>
  </div>

  <div class="card">
    <div class="card-row">
      <div class="card-info">
        <div class="card-title">🧑 Volwassenen</div>
        <div class="card-subtitle">18 jaar en ouder</div>
      </div>
      <div class="counter">
        <button class="counter-btn" onclick="wijzig('volwassenen', -1)" id="btn-volw-min">−</button>
        <span class="counter-value" id="val-volwassenen">1</span>
        <button class="counter-btn" onclick="wijzig('volwassenen', 1)" id="btn-volw-plus">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-row">
      <div class="card-info">
        <div class="card-title">👶 Kinderen</div>
        <div class="card-subtitle">Jonger dan 18 jaar</div>
      </div>
      <div class="counter">
        <button class="counter-btn" onclick="wijzig('kinderen', -1)" id="btn-kind-min">−</button>
        <span class="counter-value" id="val-kinderen">0</span>
        <button class="counter-btn" onclick="wijzig('kinderen', 1)" id="btn-kind-plus">+</button>
      </div>
    </div>

    <div id="leeftijden-wrap" style="display:none;" class="leeftijden-wrap">
      <div class="leeftijden-label">Leeftijd per kind</div>
      <div id="leeftijden-grid" class="kinderen-grid"></div>
    </div>
  </div>

</div>

<div class="summary-bar">
  <div class="summary-inner">
    <div>
      <div class="summary-label">Overzicht</div>
      <div class="summary-count" id="summary-text">1 volwassene, geen kinderen</div>
    </div>
    <button class="send-btn" onclick="verzenden()">Verstuur →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MAX_KINDEREN = 6;

  const state = {
    volwassenen: 1,
    kinderen: 0,
    leeftijden: []
  };

  function wijzig(type, delta) {
    if (type === 'volwassenen') {
      state.volwassenen = Math.max(1, Math.min(5, state.volwassenen + delta));
    } else {
      const nieuw = Math.max(0, Math.min(MAX_KINDEREN, state.kinderen + delta));
      if (nieuw > state.kinderen) {
        state.leeftijden.push('');
      } else if (nieuw < state.kinderen) {
        state.leeftijden.splice(nieuw);
      }
      state.kinderen = nieuw;
    }
    render();
  }

  function setLeeftijd(index, waarde) {
    let num = parseInt(waarde);
    if (!isNaN(num)) {
      if (num < 0) num = 0;
      if (num > 18) num = 18;
      state.leeftijden[index] = String(num);
      const input = document.getElementById('kind-input-' + index);
      if (input && parseInt(input.value) !== num) input.value = num;
    } else {
      state.leeftijden[index] = waarde;
    }
    updateSummary();
  }

  function render() {
    document.getElementById('val-volwassenen').textContent = state.volwassenen;
    document.getElementById('val-kinderen').textContent = state.kinderen;
    document.getElementById('btn-volw-min').disabled = state.volwassenen <= 1;
    document.getElementById('btn-volw-plus').disabled = state.volwassenen >= 5;
    document.getElementById('btn-kind-min').disabled = state.kinderen <= 0;
    document.getElementById('btn-kind-plus').disabled = state.kinderen >= MAX_KINDEREN;

    const wrap = document.getElementById('leeftijden-wrap');
    const grid = document.getElementById('leeftijden-grid');

    if (state.kinderen === 0) {
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'block';
      grid.innerHTML = '';
      state.leeftijden.forEach((leeftijd, i) => {
        const div = document.createElement('div');
        div.className = 'kind-item';
        div.innerHTML = `
          <div class="kind-label">Kind ${i + 1}</div>
          <input
            id="kind-input-${i}"
            class="kind-input"
            type="number"
            min="0"
            max="18"
            placeholder="jr"
            value="${leeftijd}"
            oninput="setLeeftijd(${i}, this.value)"
          />
        `;
        grid.appendChild(div);
      });
    }

    updateSummary();
  }

  function updateSummary() {
    const v = state.volwassenen;
    const k = state.kinderen;
    const vTekst = v === 1 ? '1 volwassene' : `${v} volwassenen`;
    const kTekst = k === 0 ? 'geen kinderen' : k === 1 ? '1 kind' : `${k} kinderen`;
    document.getElementById('summary-text').textContent = `${vTekst}, ${kTekst}`;
  }

  function verzenden() {
    const delen = [`Volwassenen: ${state.volwassenen}`, `Kinderen: ${state.kinderen}`];
    if (state.kinderen > 0) {
      const leeftijdenTekst = state.leeftijden
        .map(l => l !== '' ? l + ' jaar' : 'onbekend')
        .join(', ');
      delen.push(`Leeftijden: ${leeftijdenTekst}`);
    }

    window.parent.postMessage({
      name: 'inzittenden-verstuurd',
      data: delen.join(' | ')
    }, '*');

    showToast('✓ Verstuurd naar je Buddy!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  render();
</script>
</body>
</html>
